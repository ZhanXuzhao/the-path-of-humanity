<svg xmlns="http://www.w3.org/2000/svg" width="256" height="32" viewBox="0 0 256 32">
  <!-- Building icons for UI (32x32 each) -->

  <!-- 0: Woodcutter Hut -->
  <rect x="0" y="0" width="32" height="32" fill="none"/>
  <rect x="4" y="12" width="24" height="16" fill="#8a6a3a"/>
  <polygon points="2,14 16,2 30,14" fill="#6a4a2a"/>
  <rect x="12" y="20" width="8" height="8" fill="#5a3a1a"/>

  <!-- 1: Stone Quarry -->
  <rect x="32" y="0" width="32" height="32" fill="none"/>
  <rect x="2" y="14" width="28" height="14" fill="#6a6a5a"/>
  <polygon points="4,16 16,6 28,16" fill="#5a5a4a"/>
  <rect x="8" y="18" width="5" height="5" fill="#8a8a7a"/>
  <rect x="18" y="18" width="6" height="6" fill="#8a8a7a"/>

  <!-- 2: Iron Mine -->
  <rect x="64" y="0" width="32" height="32" fill="none"/>
  <polygon points="6,10 16,2 26,10" fill="#5a4a2a"/>
  <rect x="4" y="10" width="24" height="18" fill="#6a5a3a"/>
  <circle cx="16" cy="20" r="4" fill="#3a2a0a"/>

  <!-- 3: Workbench -->
  <rect x="96" y="0" width="32" height="32" fill="none"/>
  <rect x="4" y="16" width="24" height="12" fill="#6a4a2a"/>
  <rect x="6" y="6" width="20" height="10" fill="#8a6a3a"/>
  <rect x="8" y="28" width="4" height="4" fill="#5a3a1a"/>
  <rect x="20" y="28" width="4" height="4" fill="#5a3a1a"/>

  <!-- 4: Furnace -->
  <rect x="128" y="0" width="32" height="32" fill="none"/>
  <rect x="4" y="6" width="24" height="22" fill="#6a5a3a"/>
  <rect x="8" y="10" width="16" height="12" rx="1" fill="#cc4422"/>
  <ellipse cx="16" cy="16" rx="4" ry="2" fill="#ff6633" opacity="0.5"/>

  <!-- 5: Cooking Stove -->
  <rect x="160" y="0" width="32" height="32" fill="none"/>
  <rect x="6" y="10" width="20" height="18" fill="#5a4a3a"/>
  <rect x="10" y="14" width="5" height="5" fill="#cc4422"/>
  <rect x="18" y="14" width="5" height="5" fill="#cc4422"/>

  <!-- 6: Sawmill -->
  <rect x="192" y="0" width="32" height="32" fill="none"/>
  <rect x="2" y="14" width="28" height="14" fill="#7a5a3a"/>
  <polygon points="4,16 16,4 28,16" fill="#5a3a1a"/>
  <rect x="10" y="18" width="12" height="10" fill="#6a4a2a"/>

  <!-- 7: Kiln -->
  <rect x="224" y="0" width="32" height="32" fill="none"/>
  <rect x="4" y="8" width="24" height="20" fill="#7a5a3a"/>
  <ellipse cx="16" cy="8" rx="12" ry="4" fill="#8a6a4a"/>
  <rect x="8" y="12" width="16" height="12" rx="1" fill="#cc4422"/>

  <!-- Row 2: -->
  <!-- 8: Storage Rack -->
  <rect x="0" y="32" width="32" height="32" fill="none"/>
  <rect x="4" y="4" width="24" height="6" fill="#6a4a2a"/>
  <rect x="4" y="14" width="24" height="6" fill="#6a4a2a"/>
  <rect x="4" y="24" width="24" height="4" fill="#6a4a2a"/>

  <!-- 9: Warehouse -->
  <rect x="32" y="32" width="32" height="32" fill="none"/>
  <rect x="2" y="8" width="28" height="22" fill="#6a5a3a"/>
  <polygon points="2,10 16,2 30,10" fill="#5a4a2a"/>
  <rect x="6" y="14" width="4" height="4" fill="#8a7a5a"/>
  <rect x="14" y="14" width="4" height="4" fill="#8a7a5a"/>
  <rect x="22" y="14" width="4" height="4" fill="#8a7a5a"/>

  <!-- 10: Tent -->
  <rect x="64" y="32" width="32" height="32" fill="none"/>
  <polygon points="4,28 16,4 28,28" fill="#8a6a3a"/>
  <rect x="12" y="18" width="8" height="10" fill="#6a4a2a"/>

  <!-- 11: House -->
  <rect x="96" y="32" width="32" height="32" fill="none"/>
  <rect x="4" y="12" width="24" height="18" fill="#8a6a3a"/>
  <polygon points="2,14 16,2 30,14" fill="#6a4a2a"/>
  <rect x="12" y="18" width="8" height="12" fill="#5a3a1a"/>
  <rect x="6" y="16" width="4" height="4" fill="#6a5a3a"/>

  <!-- 12: Campfire -->
  <rect x="128" y="32" width="32" height="32" fill="none"/>
  <polygon points="16,2 8,16 24,16" fill="#ff6633"/>
  <polygon points="16,6 10,18 22,18" fill="#ffaa33"/>
  <rect x="12" y="22" width="8" height="8" fill="#5a3a1a"/>

  <!-- 13: Road -->
  <rect x="160" y="32" width="32" height="32" fill="none"/>
  <rect x="2" y="12" width="28" height="8" fill="#8a7a5a"/>
  <line x1="2" y1="14" x2="30" y2="14" stroke="#9a8a6a" stroke-width="1"/>
  <line x1="2" y1="18" x2="30" y2="18" stroke="#9a8a6a" stroke-width="1"/>

  <!-- 14: Wall (Defense) -->
  <rect x="192" y="32" width="32" height="32" fill="none"/>
  <rect x="2" y="2" width="28" height="28" fill="#7a7a6a"/>
  <rect x="2" y="2" width="28" height="4" fill="#8a8a7a"/>
  <rect x="10" y="8" width="12" height="18" fill="#6a6a5a"/>

  <!-- 15: Research Table -->
  <rect x="224" y="32" width="32" height="32" fill="none"/>
  <rect x="4" y="14" width="24" height="14" fill="#6a5a3a"/>
  <rect x="6" y="4" width="20" height="10" fill="#8a7a5a"/>
  <circle cx="12" cy="10" r="2" fill="#4488cc"/>
  <circle cx="20" cy="10" r="2" fill="#44cc44"/>
</svg>

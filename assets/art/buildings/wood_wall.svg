<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect x="0" y="0" width="32" height="32" fill="#8b6f47"/>
  <!-- 木板纹理 -->
  <line x1="0" y1="6" x2="32" y2="6" stroke="#7a5e36" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="12" x2="32" y2="12" stroke="#7a5e36" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="18" x2="32" y2="18" stroke="#7a5e36" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#7a5e36" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="30" x2="32" y2="30" stroke="#7a5e36" stroke-width="1.5" opacity="0.7"/>
  <!-- 木纹细节 -->
  <line x1="4" y1="2" x2="28" y2="2" stroke="#9a7e56" stroke-width="0.5" opacity="0.4"/>
  <line x1="8" y1="8" x2="24" y2="8" stroke="#6a4e26" stroke-width="0.3" opacity="0.3"/>
  <line x1="4" y1="14" x2="28" y2="14" stroke="#9a7e56" stroke-width="0.5" opacity="0.4"/>
  <line x1="8" y1="20" x2="24" y2="20" stroke="#6a4e26" stroke-width="0.3" opacity="0.3"/>
  <line x1="4" y1="26" x2="28" y2="26" stroke="#9a7e56" stroke-width="0.5" opacity="0.4"/>
  <!-- 竖向支撑柱 -->
  <rect x="0" y="0" width="2" height="32" fill="#6a4e26"/>
  <rect x="30" y="0" width="2" height="32" fill="#6a4e26"/>
  <!-- 边框 -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#5a3e16" stroke-width="1"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- 门框 -->
  <rect x="1" y="1" width="30" height="30" fill="#6a4e26"/>
  <!-- 门板 -->
  <rect x="4" y="4" width="24" height="26" fill="#8b6f47"/>
  <!-- 木板横纹 -->
  <line x1="4" y1="9" x2="28" y2="9" stroke="#7a5e36" stroke-width="1" opacity="0.6"/>
  <line x1="4" y1="14" x2="28" y2="14" stroke="#7a5e36" stroke-width="1" opacity="0.6"/>
  <line x1="4" y1="19" x2="28" y2="19" stroke="#7a5e36" stroke-width="1" opacity="0.6"/>
  <line x1="4" y1="24" x2="28" y2="24" stroke="#7a5e36" stroke-width="1" opacity="0.6"/>
  <!-- 门缝（表示可开关） -->
  <line x1="16" y1="4" x2="16" y2="30" stroke="#5a3e16" stroke-width="0.8" opacity="0.4" stroke-dasharray="1 3"/>
  <!-- 门把手 -->
  <circle cx="13" cy="17" r="1.5" fill="#c8a84e"/>
  <circle cx="13" cy="17" r="0.8" fill="#dbb85e"/>
  <!-- 门框边框 -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#5a3e16" stroke-width="1.5"/>
  <!-- 门槛 -->
  <rect x="2" y="28" width="28" height="3" fill="#5a3e16"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- 铁质门框 -->
  <rect x="0" y="0" width="32" height="32" fill="#3a3a3a"/>
  <!-- 门板 -->
  <rect x="3" y="3" width="26" height="27" fill="#505050"/>
  <!-- 金属拼接横纹 -->
  <line x1="3" y1="8" x2="29" y2="8" stroke="#454545" stroke-width="1" opacity="0.6"/>
  <line x1="3" y1="13" x2="29" y2="13" stroke="#454545" stroke-width="1" opacity="0.6"/>
  <line x1="3" y1="18" x2="29" y2="18" stroke="#454545" stroke-width="1" opacity="0.6"/>
  <line x1="3" y1="23" x2="29" y2="23" stroke="#454545" stroke-width="1" opacity="0.6"/>
  <!-- 铆钉 -->
  <circle cx="6" cy="6" r="1" fill="#6a6a6a"/>
  <circle cx="26" cy="6" r="1" fill="#6a6a6a"/>
  <circle cx="6" cy="11" r="1" fill="#6a6a6a"/>
  <circle cx="26" cy="11" r="1" fill="#6a6a6a"/>
  <circle cx="6" cy="16" r="1" fill="#6a6a6a"/>
  <circle cx="26" cy="16" r="1" fill="#6a6a6a"/>
  <circle cx="6" cy="21" r="1" fill="#6a6a6a"/>
  <circle cx="26" cy="21" r="1" fill="#6a6a6a"/>
  <circle cx="6" cy="26" r="1" fill="#6a6a6a"/>
  <circle cx="26" cy="26" r="1" fill="#6a6a6a"/>
  <!-- 门缝 -->
  <line x1="16" y1="3" x2="16" y2="30" stroke="#3a3a3a" stroke-width="0.8" opacity="0.5"/>
  <!-- 把手（铁质） -->
  <rect x="11" y="14" width="2" height="5" fill="#7a7a7a" rx="0.5"/>
  <circle cx="12" cy="17" r="1.5" fill="#888888"/>
  <circle cx="12" cy="17" r="0.8" fill="#999999"/>
  <!-- 金属光泽 -->
  <rect x="3" y="3" width="5" height="27" fill="#6a6a6a" opacity="0.1"/>
  <!-- 外框 -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- 门槛 -->
  <rect x="1" y="28" width="30" height="3" fill="#2a2a2a"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32">
  <!-- Bed frame -->
  <rect x="2" y="6" width="60" height="22" rx="2" fill="#7a5a3a"/>
  <rect x="2" y="6" width="60" height="3" fill="#8a6a4a"/>
  <!-- Mattress -->
  <rect x="4" y="9" width="56" height="16" rx="1" fill="#c49a6c"/>
  <!-- Pillow -->
  <rect x="6" y="10" width="16" height="8" rx="3" fill="#dab58a"/>
  <!-- Blanket -->
  <rect x="22" y="10" width="36" height="12" rx="1" fill="#5a8a4a"/>
  <!-- Blanket pattern lines -->
  <line x1="28" y1="10" x2="28" y2="22" stroke="#4a7a3a" stroke-width="0.8" opacity="0.4"/>
  <line x1="34" y1="10" x2="34" y2="22" stroke="#4a7a3a" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="10" x2="40" y2="22" stroke="#4a7a3a" stroke-width="0.8" opacity="0.4"/>
  <line x1="46" y1="10" x2="46" y2="22" stroke="#4a7a3a" stroke-width="0.8" opacity="0.4"/>
  <line x1="52" y1="10" x2="52" y2="22" stroke="#4a7a3a" stroke-width="0.8" opacity="0.4"/>
  <!-- Bed legs -->
  <rect x="4" y="26" width="3" height="4" fill="#6a4a2a"/>
  <rect x="57" y="26" width="3" height="4" fill="#6a4a2a"/>
  <!-- Wood grain lines -->
  <line x1="6" y1="7" x2="58" y2="7" stroke="#6a4a2a" stroke-width="0.5" opacity="0.3"/>
  <line x1="6" y1="8" x2="58" y2="8" stroke="#6a4a2a" stroke-width="0.5" opacity="0.3"/>
</svg>

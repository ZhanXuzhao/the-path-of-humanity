<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- 门框（石质） -->
  <rect x="0" y="0" width="32" height="32" fill="#7a7a7a"/>
  <!-- 石砖背景 -->
  <rect x="2" y="2" width="28" height="28" fill="#8a8a8a"/>
  <line x1="2" y1="8" x2="30" y2="8" stroke="#6a6a6a" stroke-width="0.8" opacity="0.5"/>
  <line x1="2" y1="14" x2="30" y2="14" stroke="#6a6a6a" stroke-width="0.8" opacity="0.5"/>
  <line x1="2" y1="20" x2="30" y2="20" stroke="#6a6a6a" stroke-width="0.8" opacity="0.5"/>
  <line x1="2" y1="26" x2="30" y2="26" stroke="#6a6a6a" stroke-width="0.8" opacity="0.5"/>
  <!-- 拱形门洞 -->
  <rect x="6" y="8" width="20" height="22" fill="#5a5a5a"/>
  <path d="M 6 8 Q 16 -2 26 8" fill="#5a5a5a" stroke="#4a4a4a" stroke-width="0"/>
  <!-- 石门板 -->
  <rect x="8" y="10" width="16" height="20" fill="#9a9a9a"/>
  <path d="M 8 10 Q 16 2 24 10" fill="#9a9a9a"/>
  <!-- 石质纹理 -->
  <line x1="8" y1="15" x2="24" y2="15" stroke="#8a8a8a" stroke-width="0.5" opacity="0.5"/>
  <line x1="8" y1="20" x2="24" y2="20" stroke="#8a8a8a" stroke-width="0.5" opacity="0.5"/>
  <line x1="8" y1="25" x2="24" y2="25" stroke="#8a8a8a" stroke-width="0.5" opacity="0.5"/>
  <!-- 门把手 -->
  <circle cx="12" cy="20" r="1.5" fill="#aaaaaa"/>
  <circle cx="12" cy="20" r="0.8" fill="#bbbbbb"/>
  <!-- 门缝 -->
  <line x1="16" y1="10" x2="16" y2="30" stroke="#6a6a6a" stroke-width="0.6" opacity="0.3"/>
  <!-- 外框 -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#5a5a5a" stroke-width="1.5"/>
  <rect x="4" y="4" width="24" height="24" fill="none" stroke="#5a5a5a" stroke-width="1"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- 木哨塔 - 木制结构塔楼 -->
  <!-- 底座 -->
  <rect x="4" y="20" width="24" height="12" fill="#8b6f47"/>
  <rect x="4" y="20" width="24" height="12" fill="none" stroke="#6a4e26" stroke-width="1"/>
  <!-- 底座木板纹理 -->
  <line x1="4" y1="24" x2="28" y2="24" stroke="#7a5e36" stroke-width="0.8" opacity="0.5"/>
  <line x1="4" y1="28" x2="28" y2="28" stroke="#7a5e36" stroke-width="0.8" opacity="0.5"/>
  
  <!-- 塔身立柱 -->
  <rect x="4" y="6" width="3" height="14" fill="#6a4e26"/>
  <rect x="25" y="6" width="3" height="14" fill="#6a4e26"/>
  <!-- 横梁 -->
  <rect x="7" y="16" width="18" height="2" fill="#7a5e36"/>
  
  <!-- 瞭望平台 -->
  <rect x="2" y="12" width="28" height="4" fill="#8b6f47"/>
  <rect x="2" y="12" width="28" height="4" fill="none" stroke="#6a4e26" stroke-width="0.8"/>
  <!-- 平台木板纹理 -->
  <line x1="2" y1="13" x2="30" y2="13" stroke="#9a7e56" stroke-width="0.5" opacity="0.4"/>
  <line x1="2" y1="14" x2="30" y2="14" stroke="#6a4e26" stroke-width="0.5" opacity="0.4"/>
  
  <!-- 栏杆 -->
  <rect x="2" y="10" width="28" height="2" fill="#7a5e36" opacity="0.8"/>
  <rect x="2" y="10" width="1.5" height="6" fill="#6a4e26"/>
  <rect x="9" y="10" width="1.5" height="6" fill="#6a4e26"/>
  <rect x="16" y="10" width="1.5" height="6" fill="#6a4e26"/>
  <rect x="22" y="10" width="1.5" height="6" fill="#6a4e26"/>
  <rect x="28.5" y="10" width="1.5" height="6" fill="#6a4e26"/>
  
  <!-- 屋顶（尖顶） -->
  <polygon points="16,0 2,10 30,10" fill="#7a5e36"/>
  <polygon points="16,0 2,10 30,10" fill="none" stroke="#5a3e16" stroke-width="1"/>
  <!-- 屋顶瓦片纹理 -->
  <line x1="16" y1="0" x2="2" y2="10" stroke="#8b6f47" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="0" x2="30" y2="10" stroke="#8b6f47" stroke-width="0.5" opacity="0.4"/>
  
  <!-- 射击口 -->
  <rect x="12" y="13" width="6" height="2" fill="#3a2e16"/>
  <rect x="6" y="13" width="2" height="2" fill="#3a2e16"/>
  <rect x="22" y="13" width="2" height="2" fill="#3a2e16"/>
  
  <!-- 门 -->
  <rect x="13" y="24" width="6" height="8" fill="#5a3e16"/>
  <rect x="13" y="24" width="6" height="8" fill="none" stroke="#4a2e06" stroke-width="0.8"/>
  <circle cx="18" cy="28" r="0.8" fill="#3a2e06"/>
  
  <!-- 边框 -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#4a2e06" stroke-width="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect x="0" y="0" width="32" height="32" fill="#8a8a8a"/>
  <!-- 石砖缝 - 横 -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#6a6a6a" stroke-width="1.2"/>
  <!-- 石砖缝 - 竖（交错排列） -->
  <line x1="10" y1="0" x2="10" y2="8" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="20" y1="0" x2="20" y2="8" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="5" y1="8" x2="5" y2="16" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="15" y1="8" x2="15" y2="16" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="25" y1="8" x2="25" y2="16" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="10" y1="16" x2="10" y2="24" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="20" y1="16" x2="20" y2="24" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="5" y1="24" x2="5" y2="32" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="15" y1="24" x2="15" y2="32" stroke="#6a6a6a" stroke-width="1.2"/>
  <line x1="25" y1="24" x2="25" y2="32" stroke="#6a6a6a" stroke-width="1.2"/>
  <!-- 石材质感 -->
  <rect x="2" y="2" width="6" height="5" fill="#9a9a9a" opacity="0.3"/>
  <rect x="12" y="2" width="6" height="5" fill="#7a7a7a" opacity="0.3"/>
  <rect x="22" y="2" width="6" height="5" fill="#949494" opacity="0.3"/>
  <rect x="7" y="10" width="6" height="5" fill="#949494" opacity="0.3"/>
  <rect x="17" y="10" width="6" height="5" fill="#7a7a7a" opacity="0.3"/>
  <rect x="2" y="18" width="6" height="5" fill="#7a7a7a" opacity="0.3"/>
  <rect x="12" y="18" width="6" height="5" fill="#9a9a9a" opacity="0.3"/>
  <rect x="22" y="18" width="6" height="5" fill="#949494" opacity="0.3"/>
  <rect x="7" y="26" width="6" height="5" fill="#949494" opacity="0.3"/>
  <rect x="17" y="26" width="6" height="5" fill="#7a7a7a" opacity="0.3"/>
  <!-- 边框 -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#5a5a5a" stroke-width="1"/>
</svg>

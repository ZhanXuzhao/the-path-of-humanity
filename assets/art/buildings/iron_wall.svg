<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect x="0" y="0" width="32" height="32" fill="#4a4a4a"/>
  <!-- 金属板拼接 -->
  <rect x="1" y="1" width="14" height="15" fill="#505050" stroke="#3a3a3a" stroke-width="0.5"/>
  <rect x="17" y="1" width="14" height="15" fill="#484848" stroke="#3a3a3a" stroke-width="0.5"/>
  <rect x="1" y="17" width="14" height="14" fill="#484848" stroke="#3a3a3a" stroke-width="0.5"/>
  <rect x="17" y="17" width="14" height="14" fill="#505050" stroke="#3a3a3a" stroke-width="0.5"/>
  <!-- 铆钉 -->
  <circle cx="3" cy="3" r="1" fill="#6a6a6a"/>
  <circle cx="13" cy="3" r="1" fill="#6a6a6a"/>
  <circle cx="3" cy="13" r="1" fill="#6a6a6a"/>
  <circle cx="13" cy="13" r="1" fill="#6a6a6a"/>
  <circle cx="19" cy="3" r="1" fill="#6a6a6a"/>
  <circle cx="29" cy="3" r="1" fill="#6a6a6a"/>
  <circle cx="19" cy="13" r="1" fill="#6a6a6a"/>
  <circle cx="29" cy="13" r="1" fill="#6a6a6a"/>
  <circle cx="3" cy="19" r="1" fill="#6a6a6a"/>
  <circle cx="13" cy="19" r="1" fill="#6a6a6a"/>
  <circle cx="3" cy="29" r="1" fill="#6a6a6a"/>
  <circle cx="13" cy="29" r="1" fill="#6a6a6a"/>
  <circle cx="19" cy="19" r="1" fill="#6a6a6a"/>
  <circle cx="29" cy="19" r="1" fill="#6a6a6a"/>
  <circle cx="19" cy="29" r="1" fill="#6a6a6a"/>
  <circle cx="29" cy="29" r="1" fill="#6a6a6a"/>
  <!-- 金属光泽 -->
  <rect x="2" y="2" width="4" height="13" fill="#6a6a6a" opacity="0.15"/>
  <rect x="18" y="2" width="4" height="13" fill="#6a6a6a" opacity="0.15"/>
  <!-- 边框 -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <!-- 加强筋 -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#3a3a3a" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
</svg>

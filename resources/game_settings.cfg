; 游戏设置 - Game Settings
; 可通过此文件配置游戏各项参数

[time]

; 一天的现实长度（秒），默认240秒=4分钟，即10现实秒=1游戏小时
day_length=240.0

[camera]

; 屏幕滚动速度（像素/秒）
scroll_speed=1000.0

; 边缘滚动触发边距（像素）
edge_scroll_margin=20

[settler]

; 负重上限
carry_capacity=50.0

; 基础移动速度（像素/秒）
base_move_speed=60.0

; 敏捷对移速的加成（每点敏捷增加）
dexterity_move_bonus=3.0

; 生命基础值
base_hp=80.0

; 体质对生命的加成（每点体质增加）
constitution_hp_bonus=4.0

; 饱食度每小时衰减
hunger_decay_per_hour=4.17

; 精力每小时衰减
rest_decay_per_hour=3.0

; 舒适度每小时衰减
comfort_decay_per_hour=1.0

; 社交每小时衰减
social_decay_per_hour=2.0

; 安全感每小时衰减
safety_decay_per_hour=0.5

; 进食一次恢复的饱食度
food_restore_amount=100.0

; 睡眠每小时恢复的精力
sleep_restore_per_hour=15.0

; 搜索附近存储建筑的最大距离
storage_search_radius=300.0

; 搜索附近食物的最大距离
food_search_radius=400.0

[resources]

; 每次采集获得的资源数量
harvest_amount=5.0

; 资源初始点数倍率
resource_amount_multiplier=5.0

[speed]

; 游戏速度档位列表，用于 +/- 快捷键和 HUD 速度按钮
levels=[0.1, 0.2, 0.5, 1.0, 2.0, 3.0, 5.0, 10.0]

[building]

; 储物架容量
storage_rack_capacity=10000

[work]

; 默认工作优先级（1=最低, 2=低, 3=中, 4=最高, 0=不做）
mining_priority=2
woodcutting_priority=3
construction_priority=4
crafting_priority=3
cooking_priority=2
farming_priority=2
hauling_priority=1
research_priority=3
combat_priority=1
